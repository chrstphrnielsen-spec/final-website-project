<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Number Guessing Game</title>
    <style>
      body{font-family: Arial, Helvetica, sans-serif;background:#fafafa;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
      .card{background:#fff;padding:2rem;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.08);width:320px}
      input{width:100%;padding:.5rem;margin-top:.5rem}
      button{margin-top:.75rem;padding:.5rem 1rem}
      .status{margin-top:.75rem}
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Guess the Number</h2>
      <p>I'm thinking of a number between 1 and 100. Try to guess it!</p>
      <input id="guess" type="number" min="1" max="100" placeholder="Enter your guess">
      <button id="check">Check</button>
      <button id="reset">Restart</button>
      <div class="status" id="status"></div>
      <div class="attempts" id="attempts"></div>
    </div>

    <script>
      let secret = Math.floor(Math.random()*100)+1;
      let tries = 0;
      const status = document.getElementById('status');
      const attempts = document.getElementById('attempts');
      document.getElementById('check').addEventListener('click', ()=>{
        const val = Number(document.getElementById('guess').value);
        if(!val){ status.textContent='Please enter a number.'; return; }
        tries++;
        if(val===secret){ status.textContent='🎉 Correct! You guessed it.'; attempts.textContent=`Attempts: ${tries}`; }
        else if(val<secret){ status.textContent='Too low — try higher.'; attempts.textContent=`Attempts: ${tries}` }
        else { status.textContent='Too high — try lower.'; attempts.textContent=`Attempts: ${tries}` }
      });
      document.getElementById('reset').addEventListener('click', ()=>{ secret = Math.floor(Math.random()*100)+1; tries=0; status.textContent='Game reset. Good luck!'; attempts.textContent=''; document.getElementById('guess').value=''; });
    </script>
  </body>
</html>
